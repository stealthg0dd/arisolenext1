// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        // Core Versioning
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "26.1.10909125"
        
        // Kotlin Fix: Version 1.9.24 is the stable bridge for Expo 52/53
        // If you are on Expo 54/55, change this to "2.1.20"
        kotlinVersion = "2.0.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle')
        classpath('com.facebook.react:react-native-gradle-plugin')
        // Reference the global version defined in the ext block above
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                if (project.android.hasProperty('externalNativeBuild')) {
                    externalNativeBuild {
                        cmake {
                            cppFlags "-std=c++20"
                            arguments "-DANDROID_STL=c++_shared"
                        }
                    }
                }
            }
        }
    }
}